# BEGIN_KITTY_THEME
include kitty-catppuccin.conf
# END_KITTY_THEME

# Settings
wayland_titlebar_color #1E1E2E
enable_audio_bell no
hide_window_decorations yes

# Font
font_family      "Hack Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Key bind
enabled_layouts splits:split_axis=horizontal

